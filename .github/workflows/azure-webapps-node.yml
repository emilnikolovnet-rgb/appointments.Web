name: Build and Push to Azure CR

on:
  push:
    branches: [ "main" ] # Triggers when you push to main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Checkout your code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Log in to Azure using the secret you created
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 3. Log in to your existing Azure Container Registry
    - name: Log in to ACR
      run: |
        az acr login --name crappointments

    # 4. Build the image and push it (using a unique folder name in your registry)
    - name: Build and Push Docker Image
      run: |
        docker build -t crappointments.azurecr.io/appointments.web:${{ github.sha }} .
        docker push crappointments.azurecr.io/appointments.web:${{ github.sha }}
