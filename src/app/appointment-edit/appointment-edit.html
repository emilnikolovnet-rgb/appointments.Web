<form formGroup="appointmentEditForm" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="title">Title</label>
    <input type="text" id="title" formControlName="title" class="form-control" name="title" />
  </div>

  <div class="form-group">
    <label for="date">Date</label>
    <input type="date" id="date" formControlName="date" class="form-control" type="datetime-local" name="date" />
  </div>

  <div class="form-group">
    <label for="time">Time</label>
    <input type="time" id="time" formControlName="time" class="form-control" name="time" />
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" formControlName="description" class="form-control" name="description"></textarea>
  </div>

  <button type="submit" class="btn btn-primary">Save</button>

</form>
