<div class="modal-header">
  <h4 class="modal-title">{{ id ? 'Edit Appointment' : 'New Appointment' }}</h4>
  <button type="button" class="btn-close" aria-label="Close" (click)="cancel()"></button>
</div>
<div class="modal-body">
  <form [formGroup]="form">
    <div class="form-group w-50">
      <label for="firstName">First Name*</label>
      <input type="text" id="firstName" formControlName="firstName" class="form-control" name="firstName" />
    </div>

    <div class="form-group w-50">
      <label for="lastName">Last Name*</label>
      <input type="text" id="lastName" formControlName="lastName" class="form-control" name="lastName" />
    </div>

    <div class="form-group">
      <label for="date">Date*</label>
      <div>
        <mat-form-field appearance="fill">
          <mat-label>Select date</mat-label>
          <input matInput [matDatepicker]="picker" [min]="minDate" formControlName="date" name="date" placeholder="dd/MM/yyyy" (dateChange)="setAvailableValues()" />
          <mat-hint>dd/MM/yyyy</mat-hint>
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Select time</mat-label>
          <mat-select formControlName="time" name="time">
            @for (time of availableTimes; track time) {
              <mat-option [value]="time">{{ time }}</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>
    </div>

    <div class="form-group w-50">
      <label for="description">Description*</label>
      <textarea id="additionalInfo" formControlName="additionalInfo" class="form-control" name="additionalInfo"></textarea>
    </div>

    <div class="modal-footer">
      <button type="button" class="btn border me-2" (click)="cancel()">Cancel</button>
      <button type="button" class="btn btn-primary" (click)="save()">Save</button>
    </div>
  </form>
</div>
